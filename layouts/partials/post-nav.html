{{ if (or .PrevInSection .NextInSection) }}
  <ul class="meta-list">
    <li>
      <b>Prev:</b>
      {{ with .PrevInSection }}
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ else }}
        -
      {{ end }}
    </li>

    <li>
      <b>Next:</b>
      {{ with .NextInSection }}
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ else }}
        -
      {{ end }}
    </li>
  </ul>
{{ end }}
