{{ define "main" }}
  <h2>Latest Posts</h2>

  {{ partial "post-table" .Paginator }}
  {{ partial "paginator" .Paginator }}

  <hr />

  <h2>Tags</h2>

  <!--
  <div class="warn">
    Hello World Warn
  </div>

  <div class="note">
    Hello World Note
  </div>
  -->

  <ul class="tags data-list">
    {{ range .Site.Taxonomies.tags }}
      <li><a href="/tags/{{ .Page.Name | urlize }}/">#{{ .Page.Name }}</a> ({{ .Count }})</li>
    {{ end }}
  </ul>
{{ end }}
