pipeline:
  master:
    group: build
    image: plugins/docker
    repo: belak/blog
    dockerfile: Dockerfile
    tag: latest
    secrets: [ docker_username, docker_password ]
    when:
      branch: master
      event: push

  beta:
    group: build
    image: plugins/docker
    repo: belak/blog
    dockerfile: Dockerfile.beta
    tag: draft
    secrets: [ docker_username, docker_password ]
    when:
      branch: master
      event: push
